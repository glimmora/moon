version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: moonfun-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: moon
      POSTGRES_PASSWORD: moon
      POSTGRES_DB: moonfun
    ports:
      - "5432:5432"
    volumes:
      - moonfun-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moon -d moonfun"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: moonfun-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - moonfun-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  moonfun-pgdata:
  moonfun-redisdata:
