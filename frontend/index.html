<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/moon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta
      name="description"
      content="Moon — permissionless meme-token launchpad with multi-shape bonding curves."
    />
    <title>Moon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the persisted (or system) theme BEFORE first paint to avoid a
      // dark→light flash for users who prefer the light theme.
      (function () {
        try {
          var stored = localStorage.getItem("Moon.theme");
          var prefersLight =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches;
          var theme = stored || (prefersLight ? "light" : "dark");
          var root = document.documentElement;
          root.classList.add(theme === "light" ? "light" : "dark");
          root.classList.remove(theme === "light" ? "dark" : "light");
          root.style.colorScheme = theme === "light" ? "light" : "dark";
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
