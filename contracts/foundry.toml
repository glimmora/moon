[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200
verbosity = 3
auto_detect_solc = false
fs_permissions = [{ access = "read", path = "./deployments" }, { access = "read", path = "./script" }]

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/",
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "preserve"

[profile.ci.fuzz]
runs = 2000

[profile.ci.invariant]
runs = 500
