services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: moon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moon}
      POSTGRES_DB: moonfun
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moon -d moonfun"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    environment:
      NODE_ENV: production
      BACKEND_PORT: 4000
      DATABASE_URL: postgresql://moon:${POSTGRES_PASSWORD:-moon}@db:5432/moonfun
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    ports:
      - "4000:4000"
    # Apply pending migrations on boot, then start the server.
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
        VITE_WALLETCONNECT_PROJECT_ID: ${VITE_WALLETCONNECT_PROJECT_ID:-}
        VITE_RPC_ETHEREUM_SEPOLIA: ${VITE_RPC_ETHEREUM_SEPOLIA:-https://sepolia.drpc.org}
        VITE_FACTORY_ETHEREUM_SEPOLIA: ${VITE_FACTORY_ETHEREUM_SEPOLIA:-0xC3DadD2643a6aB9857880EF7Bf208dEdd31937b3}
        VITE_FEE_ROUTER_ETHEREUM_SEPOLIA: ${VITE_FEE_ROUTER_ETHEREUM_SEPOLIA:-0x95032e828144707e9754993e421c31dE986A3bb1}
        VITE_CREATOR_FEE_VAULT_ETHEREUM_SEPOLIA: ${VITE_CREATOR_FEE_VAULT_ETHEREUM_SEPOLIA:-0x3c67d2f9f3aA5B909332f2eF7a3862b58015345B}
        VITE_REFERRAL_REGISTRY_ETHEREUM_SEPOLIA: ${VITE_REFERRAL_REGISTRY_ETHEREUM_SEPOLIA:-0xADB082E1AA4696bffDAD8aB754874d31E37e9Fe0}
        VITE_MOON_BURNER_ETHEREUM_SEPOLIA: ${VITE_MOON_BURNER_ETHEREUM_SEPOLIA:-0x47240bE29d50Eeb46bCCE0c227D67A34CE18682c}
        VITE_V3_CONCENTRATOR_ETHEREUM_SEPOLIA: ${VITE_V3_CONCENTRATOR_ETHEREUM_SEPOLIA:-0x17Fa6827FacD0B41Fa263ed1bC1E6D0bD73DaD30}
        VITE_MOON_TOKEN_ETHEREUM_SEPOLIA: ${VITE_MOON_TOKEN_ETHEREUM_SEPOLIA:-0x4E0994001515F4fe9335bbE73691750859a82835}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "8080:80"

volumes:
  db-data:
